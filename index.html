<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>tvini – Panda Stolpern</title>
  <style>
    body {
      font-family: monospace;
      max-width: 700px;
      margin: 40px auto;
      line-height: 1.6;
      position: relative;
      height: 250px;
      overflow: hidden;
    }

    h1 { color: #333; }

    .ground {
      position: absolute;
      bottom: 20px;
      left: 0;
      width: 100%;
      height: 2px;
      background: #333;
    }

    .panda {
      position: absolute;
      bottom: 25px;
      left: -200px;
      white-space: pre;
      font-size: 16px;
      animation: walk 6s linear infinite;
    }

    @keyframes walk {
      0%   { transform: translateX(-200px) rotate(0deg); }
      40%  { transform: translateX(200px) rotate(0deg); }   
      50%  { transform: translateX(250px) rotate(30deg); } 
      55%  { transform: translateX(260px) rotate(90deg); }  
      65%  { transform: translateX(260px) rotate(90deg); }  
      75%  { transform: translateX(300px) rotate(0deg); }   
      100% { transform: translateX(900px) rotate(0deg); }   
    }
  </style>
</head>
<body>

<h1>welcome to tvini</h1>

<div class="panda">
(ᵔᴥᵔ)
 /︶\
</div>

<div class="ground"></div>

</body>
</html>
