<!DOCTYPE html>

<head>

  <title>tvini – Pixel Panda</title>
  <style>
    body {
      background: #fafafa;
      font-family: monospace;
      max-width: 700px;
      margin: 40px auto;
      position: relative;
      height: 300px;
      overflow: hidden;
    }

    h1 { color: #333; }

    .ground {
      position: absolute;
      bottom: 40px;
      left: 0;
      width: 100%;
      height: 3px;
      background: #333;
    }

    .panda {
      position: absolute;
      bottom: 40px;
      left: 20px;
      width: 80px;
      height: 80px;
      background: transparent;
      display: grid;
      grid-template-columns: repeat(8, 10px);
      grid-template-rows: repeat(8, 10px);
    }

    .p { background: #000; }      
    .w { background: #fff; }      
    .t { background: transparent; } 
  </style>
</head>
