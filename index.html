<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>tvini</title>
  <style>
    body { 
      font-family: sans-serif; 
      max-width: 700px; 
      margin: 40px auto; 
      line-height: 1.6; 
      position: relative;
      overflow: hidden;
    }

    h1 { color: #333; }

    .panda {
      position: absolute;
      top: 50px;
      left: -100px;
      font-size: 3rem;
      animation: tumble 6s linear infinite;
    }

    @keyframes tumble {
      0%   { transform: translateX(-100px) rotate(0deg); }
      25%  { transform: translateX(200px) rotate(180deg); }
      50%  { transform: translateX(400px) rotate(360deg); }
      75%  { transform: translateX(600px) rotate(540deg); }
      100% { transform: translateX(900px) rotate(720deg); }
    }
  </style>
</head>
<body>
  <h1>welcome to tvini</h1>

  <!-- Hier purzelt der Panda -->
  <div class="panda">🐼</div>

</body>
</html>
